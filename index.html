<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Something I Wanted to Ask You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    color: white;
    text-align: center;
    overflow-x: hidden;
  }

  @keyframes bgMove {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
  }

  .card {
    width: min(92%, 420px);
    padding: 40px 30px 45px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);
    border-radius: 28px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
    animation: cardIn 1.1s ease;
    color: #333;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(0.95);}
    to { opacity:1; transform:translateY(0) scale(1);}
  }

  .emoji {
    font-size: 68px;
    margin-bottom: 12px;
  }

  .buttons button {
    position: absolute;
    padding: 14px 36px;
    border-radius: 40px;
    border: none;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .buttons {
    position:relative;
    height:78px;
  }

  #yes { left:12%; background:linear-gradient(135deg,#ff4d6d,#ff758f); color:#fff; }
  #no { left:55%; background:#fff; color:#777; }

  button { margin-top: 30px; padding: 15px 25px; font-size: 16px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #0ea5e9; }

  #introPage p { color: #333; line-height: 1.6; }

  .heart {
    position: absolute;
    pointer-events: none;
    animation-name: floatHeart;
    animation-timing-function: ease-out;
  }

  @keyframes floatHeart {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-150px); opacity: 0; }
  }

  #heartContainer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .container { max-width: 700px; margin: auto; padding: 60px 20px; }
</style>
</head>

<body>

<div id="introPage">
  <h1 style="font-family:Poppins;">Hey Baby</h1>
  <p>I made something for you.</p>
  <p style="max-width:520px; margin:10px auto 25px;">
    I didn’t want to just randomly ask you in a message.<br>
    I wanted to do it in a way that shows I actually care and put thought into it.<br>
    So… this is me trying to do that 🙂
  </p>
  <button onclick="openValentine()">Click hereee!</button>
</div>

<div class="container">
  <div id="valentinePage" style="display:none; opacity:0; transition:opacity 0.7s ease;">
    <div id="heartContainer"></div>
    <div class="card">
      <div class="emoji">🫢❤️</div>
      <h2>Jasmin,<br>will you be my girlfriend?</h2>
      <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 🙈</button>
      </div>
      <div class="hint">Some love stories don’t allow “no” ✨</div>
    </div>
    <audio id="hoverSound" src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-voice-laugh-343.mp3"></audio>
    <audio id="yesSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>
  </div>
</div>

<script>
  // Hearts for intro page
  function createIntroHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = Math.random() > 0.5 ? "❤️" : "💗";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";
    heart.style.fontSize = Math.random() * 22 + 14 + "px";
    heart.style.animationDuration = Math.random() * 3 + 4 + "s";
    heart.style.opacity = Math.random() * 0.5 + 0.4;
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
  }
  setInterval(createIntroHeart, 380);

  // Hearts for Valentine page
  function createValentineHeart() {
    const container = document.getElementById("heartContainer");
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = Math.random() > 0.5 ? "❤️" : "💗";
    heart.style.left = Math.random() * container.offsetWidth + "px";
    heart.style.top = Math.random() * container.offsetHeight + "px";
    heart.style.fontSize = Math.random() * 22 + 14 + "px";
    heart.style.animationDuration = Math.random() * 3 + 4 + "s";
    heart.style.opacity = Math.random() * 0.5 + 0.4;
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
  }

  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const card = document.querySelector(".card");
  const hoverSound = document.getElementById("hoverSound");
  const yesSound = document.getElementById("yesSound");

  noBtn.addEventListener("mouseenter", () => {
    hoverSound.currentTime = 0;
    hoverSound.play();
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = cardRect.width - btnRect.width - 10;
    const maxY = cardRect.height - btnRect.height - 10;
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
  });

  yesBtn.addEventListener("click", () => {
    yesSound.play();
    confetti({ particleCount: 260, spread: 120, origin: { y: 0.65 } });
    setTimeout(() => { alert("YAY 💕 I can’t wait to meet with you!"); }, 500);
  });

  function openValentine() {
    const intro = document.getElementById("introPage");
    const page = document.getElementById("valentinePage");
    intro.style.opacity = "0";
    setTimeout(() => {
      intro.style.display = "none";
      page.style.display = "flex";
      setTimeout(() => {
        page.style.opacity = "1";
        setInterval(createValentineHeart, 380);
      }, 50);
    }, 500);
  }
</script>

</body>
</html>
